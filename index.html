<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#050505" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Nymo</title>

    <!-- Speed up third-party fetches: opens DNS + TLS in parallel with parsing. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.socket.io" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

    <link id="appFavicon" rel="icon" type="image/png" href="./pwa/favicon-dark.png?v=3" />
    <link id="appFaviconShort" rel="shortcut icon" type="image/png" href="./pwa/favicon-dark.png?v=3" />
    <link rel="manifest" href="./manifest.webmanifest?v=4" />
    <link id="appAppleTouchIcon" rel="apple-touch-icon" href="./pwa/favicon-dark.png?v=3" />
    <script>
      (() => {
        let savedTheme = '';
        try {
          savedTheme = localStorage.getItem('nymo_theme') || localStorage.getItem('orion_theme') || '';
          if (!localStorage.getItem('nymo_theme') && (savedTheme === 'dark' || savedTheme === 'light')) {
            localStorage.setItem('nymo_theme', savedTheme);
          }
        } catch {}
        const prefersDark = window.matchMedia
          ? window.matchMedia('(prefers-color-scheme: dark)').matches
          : true;
        const isDark = savedTheme === 'dark' || (savedTheme !== 'light' && prefersDark);
        document.documentElement.classList.toggle('dark-theme', isDark);
        const fixedIconHref = './pwa/favicon-dark.png?v=3';
        document.getElementById('appFavicon')?.setAttribute('href', fixedIconHref);
        document.getElementById('appFaviconShort')?.setAttribute('href', fixedIconHref);
        document.getElementById('appAppleTouchIcon')?.setAttribute('href', fixedIconHref);
      })();
    </script>

    <!-- Primary UI font. Kept in HTML (not @import) so it downloads in parallel with the rest of CSS. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap"
    />

    <!-- Decorative / mini-game fonts. media=print + onload makes the browser fetch
         them without blocking first paint; they swap in once available. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Pixelify+Sans:wght@400..700&family=Press+Start+2P&display=swap"
      media="print"
      onload="this.media='all'; this.onload=null;"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Pixelify+Sans:wght@400..700&family=Press+Start+2P&display=swap"
      />
    </noscript>

    <link rel="stylesheet" href="./src/styles/main.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
          "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/"
        }
      }
    </script>
    <link rel="modulepreload" href="./src/scripts/bootstrap.js" />
  </head>
  <body>
    <div id="app"></div>
    <script defer src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script type="module" src="./src/scripts/bootstrap.js"></script>
  </body>
</html>
